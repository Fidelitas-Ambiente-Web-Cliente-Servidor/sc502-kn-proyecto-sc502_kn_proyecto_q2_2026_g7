<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | MindLink AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/auth_style.css" />
    <link rel="stylesheet" href="css/dashboard_style.css" />
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">MindLink AI</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="menu.html">Modulos</a>
                <a class="nav-link active" href="dashboard.html">Dashboard</a>
                <a class="nav-link" href="index.html">Salir</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="card-dashboard mb-4">
            <h2 class="h5 mb-3">Métricas Globales</h2>
            <div id="metricas-resumen" class="row g-3">
                </div>
        </div>

        <div class="card-dashboard">
            <h2 class="h5 mb-3">Historial Emocional</h2>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Fecha</th>
                            <th>Emoción</th>
                            <th>Estrés (1-10)</th>
                            <th>Ansiedad (1-10)</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-historial">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/dashboard.js"></script>
</body>
</html>
