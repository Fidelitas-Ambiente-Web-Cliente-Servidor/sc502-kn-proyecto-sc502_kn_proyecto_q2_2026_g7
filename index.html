<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindLink AI - Autenticación</title>
  
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  />
  
  <link rel="stylesheet" href="css/auth_style.css" />
</head>
<body>

  <header class="bg-dark text-white text-center py-4 mb-5">
    <h1>MindLink AI</h1>
    <p>Portal Estudiantil de Bienestar</p>
  </header>

  <main class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        
        <div class="card-autenticacion p-4 bg-white border rounded">
          
          <div class="d-flex justify-content-center gap-3 mb-4 border-bottom pb-2">
            <button type="button" id="btnVerLogin" class="btn btn-link nav-tab active">Iniciar Sesión</button>
            <button type="button" id="btnVerRegistro" class="btn btn-link nav-tab">Registrarse</button>
          </div>

          <div id="contenedorLogin">
            <form id="formLogin">
              <h2 class="h5 mb-3 text-center">Ingresar al Sistema</h2>
              
              <div class="mb-3">
                <label for="loginCorreo" class="form-label">Correo Electrónico</label>
                <input type="email" id="loginCorreo" class="form-control" placeholder="usuario@correo.com" />
                <div id="errorLoginCorreo" class="error-campo"></div>
              </div>

              <div class="mb-4">
                <label for="loginClave" class="form-label">Contraseña</label>
                <input type="password" id="loginClave" class="form-control" placeholder="••••••••" />
                <div id="errorLoginClave" class="error-campo"></div>
              </div>

              <button type="submit" id="btnSubmitLogin" class="btn btn-warning w-100" disabled>
                Ingresar
              </button>
            </form>
          </div>

          <div id="contenedorRegistro" class="modulo-oculto">
            <form id="formRegistro">
              <h2 class="h5 mb-3 text-center">Crear Cuenta Nueva</h2>

              <div class="mb-3">
                <label for="regNombre" class="form-label">Nombre Completo</label>
                <input type="text" id="regNombre" class="form-control" placeholder="Juan Pérez" />
                <div id="errorRegNombre" class="error-campo"></div>
              </div>

              <div class="mb-3">
                <label for="regCorreo" class="form-label">Correo Electrónico</label>
                <input type="email" id="regCorreo" class="form-control" placeholder="usuario@correo.com" />
                <div id="errorRegCorreo" class="error-campo"></div>
              </div>

              <div class="mb-4">
                <label for="regClave" class="form-label">Contraseña</label>
                <input type="password" id="regClave" class="form-control" placeholder="Mínimo 5 caracteres" />
                <div id="errorRegClave" class="error-campo"></div>
              </div>

              <button type="submit" id="btnSubmitRegistro" class="btn btn-warning w-100" disabled>
                Registrarse
              </button>
            </form>
          </div>

        </div> </div>
    </div>
  </main>

  <script src="js/auth_logic.js"></script>
</body>
</html>
